name: Classify Article

on:
  repository_dispatch:
    types: [classify-article]

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update classification
        run: |
          python3 << 'EOF'
          import json
          import os

          payload = json.loads(os.environ.get("PAYLOAD", "{}"))
          article_id = payload.get("article_id", "")
          category = payload.get("category", "unclassified")

          if not article_id:
              print("No article_id provided")
              exit(1)

          with open("data/calendar.json") as f:
              cal = json.load(f)

          # Update article category
          for a in cal["articles"]:
              if a["id"] == article_id:
                  a["category"] = category
                  print(f"Updated {article_id} -> {category}")
                  break

          # Also store in classifications map
          cal.setdefault("classifications", {})[article_id] = category

          with open("data/calendar.json", "w", encoding="utf-8") as f:
              json.dump(cal, f, ensure_ascii=False, indent=2)
          EOF
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Regenerate calendar data
        run: |
          pip install pyyaml
          python scripts/generate_feed.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🏷️ Classify: ${{ github.event.client_payload.article_id }} -> ${{ github.event.client_payload.category }}"
          git push
